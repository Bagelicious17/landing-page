<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantau Dapur MBG ERP</title>
    
    <!-- Google Fonts -->

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">

    <!-- Custom CSS for Animations -->
    <style>
        .reveal {
            opacity: 0;

        .reveal.active {
            opacity: 1;

        .delay-200 { transition-delay: 200ms; }

            height: 600px;

        /* Page Transition Animation */
        @keyframes pageFadeIn {

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="font-sans text-brand-text bg-white antialiased overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Custom Hook untuk Animasi Scroll ---
        const useScrollReveal = () => {
            const ref = useRef(null);
            
            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                            // Hentikan observasi setelah animasi berjalan sekali
                            observer.unobserve(entry.target);
                        }
                    },
                    {
                        root: null,
                        rootMargin: '0px',
                        threshold: 0.15, // Memicu saat 15% elemen terlihat
                    }
                );

                if (ref.current) {
                    observer.observe(ref.current);
                }

                return () => {
                    if (ref.current) observer.unobserve(ref.current);
                };
            }, []);

            return ref;
        };

        // --- Komponen Pembungkus Animasi ---
        const Reveal = ({ children, className = '', delay = '' }) => {
            const ref = useScrollReveal();
            return (
                <div ref={ref} className={`reveal ${delay} ${className}`}>
                    {children}
                </div>
            );
        };

        // --- Komponen Ikon (Menggunakan Lucide secara manual untuk environment ini) ---
        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (iconRef.current) {
                    // Membersihkan SVG sebelumnya
                    iconRef.current.innerHTML = '';
                    // Membuat ikon baru
                    lucide.createIcons({
                        icons: { [name]: lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        attrs: {
                            class: className,
                            'stroke-width': 2
                        }
                    });
                    
                    // Ekstrak elemen SVG yang dihasilkan lucide
                    const svgElement = document.querySelector(`[data-lucide="${name}"]`);
                    if(svgElement && iconRef.current){
                         // Kloning node karena lucide.createIcons menempatkannya di suatu tempat, kita butuh di ref kita
                         const clone = svgElement.cloneNode(true);
                         iconRef.current.appendChild(clone);
                         svgElement.remove(); // Hapus yang asli agar tidak double
                    }
                }
            }, [name, className]);

            // Fallback sederhana jika script lucide gagal atau loading
            const renderFallbackSvg = () => {
                switch(name) {
                    case 'Settings': return <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>;
                    case 'Menu': return <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>;
                    case 'X': return <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>;
                    case 'Package': return <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>;
                    case 'LayoutGrid': return <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" strokeWidth="2"></rect><rect x="14" y="3" width="7" height="7" rx="1" strokeWidth="2"></rect><rect x="14" y="14" width="7" height="7" rx="1" strokeWidth="2"></rect><rect x="3" y="14" width="7" height="7" rx="1" strokeWidth="2"></rect></svg>;
                    case 'CalendarDays': return <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2" strokeWidth="2"></rect><line x1="16" y1="2" x2="16" y2="6" strokeWidth="2"></line><line x1="8" y1="2" x2="8" y2="6" strokeWidth="2"></line><line x1="3" y1="10" x2="21" y2="10" strokeWidth="2"></line><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01" strokeWidth="2" strokeLinecap="round"></path></svg>;
                    case 'BarChart3': return <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 3v18h18"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M18 17V9"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 17V5"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 17v-3"></path></svg>;
                    default: return null;
                }
            };

            return (
                <div ref={iconRef} className="inline-flex items-center justify-center">
                    {renderFallbackSvg()}
                </div>
            );
        };

        // --- Komponen Navbar ---
        const Navbar = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 20);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-white/90 backdrop-blur-md shadow-sm py-3' : 'bg-transparent py-5'}`}>

                            <div className="flex items-center gap-2">
                                <img src="../aset/logo-erp-main.png" alt="Logo" className="h-10" />
                                <span className="font-heading font-bold text-xl text-brand-dark">Pantau Dapur MBG</span>
                            </div>

                            {/* Navigasi Desktop */}
                            <div className="hidden md:flex space-x-8">
                                <a href="#" className="text-sm font-medium text-brand-text hover:text-brand-dark transition-colors">Fitur</a>
                                <a href="pricing.html" className="text-sm font-medium text-brand-text hover:text-brand-dark transition-colors">Harga</a>
                                <a href="#" className="text-sm font-medium text-brand-text hover:text-brand-dark transition-colors">Tentang Kami</a>
                            </div>

                            {/* Tombol Aksi Desktop */}
                            <div className="hidden md:flex items-center space-x-4">
                                <a href="#" className="text-sm font-medium text-brand-text hover:text-brand-dark transition-colors">Masuk</a>
                                <a href="registration.html" className="bg-brand-dark text-white px-5 py-2.5 rounded-md text-sm font-medium hover:bg-brand-dark/90 transition-all shadow-md hover:shadow-lg">

                                <a href="#" className="block px-3 py-2 text-base font-medium text-brand-text hover:text-brand-dark hover:bg-gray-50 rounded-md">Fitur</a>
                                <a href="#" className="block px-3 py-2 text-base font-medium text-brand-text hover:text-brand-dark hover:bg-gray-50 rounded-md">Harga</a>
                                <a href="#" className="block px-3 py-2 text-base font-medium text-brand-text hover:text-brand-dark hover:bg-gray-50 rounded-md">Tentang Kami</a>
                                <div className="mt-4 pt-4 border-t border-gray-100 px-3 flex flex-col gap-2">
                                    <a href="#" className="block text-center px-3 py-2 text-base font-medium text-brand-dark border border-gray-200 rounded-md">Masuk</a>
                                    <a href="registration.html" className="block text-center px-3 py-2 text-base font-medium bg-brand-dark text-white rounded-md">Mulai Sekarang</a>
                                </div>
                            </div>
                        </div>
                    )}
                </nav>
            );
        };

        // --- Komponen Bagian Utama (Hero) ---
        const HeroSection = () => {
            return (
                <section className="relative pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden">
                    <div className="bg-blob"></div>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                        <div className="grid lg:grid-cols-2 gap-12 lg:gap-8 items-center">
                            
                            {/* Teks Hero */}
                            <div className="max-w-2xl">
                                <Reveal>
                                    <h1 className="text-4xl sm:text-5xl lg:text-6xl font-heading font-extrabold text-brand-dark leading-tight tracking-tight mb-6">
                                        Presisi Klinis untuk <br/><span className="text-transparent bg-clip-text bg-gradient-to-r from-brand-dark to-brand-light">Dapur Profesional.</span>
                                    </h1>
                                </Reveal>
                                <Reveal delay="delay-100">
                                    <p className="text-lg text-brand-text mb-8 leading-relaxed">
                                        Dapur MBG adalah solusi <em>enterprise resource planning</em> yang dirancang khusus untuk lingkungan kuliner bervolume tinggi. Integrasikan inventaris, kalkulasi biaya resep, dan penjadwalan staf dalam satu platform yang tangguh.
                                    </p>
                                </Reveal>
                                <Reveal delay="delay-200" className="flex flex-col sm:flex-row gap-4">
                                    <a href="#" className="inline-flex justify-center items-center px-8 py-3.5 border border-transparent text-base font-medium rounded-md text-brand-dark bg-brand-yellow hover:bg-[#ebd59b] transition-colors shadow-glow">
                                        Mulai Sekarang
                                    </a>
                                    
                                </Reveal>
                            </div>

                            {/* Gambar Hero */}
                            <Reveal delay="delay-300" className="relative lg:ml-auto w-full max-w-lg lg:max-w-none">
                                <div className="aspect-[4/3] rounded-2xl overflow-hidden shadow-2xl relative">
                                    {/* Overlay gradien halus */}
                                    <div className="absolute inset-0 bg-gradient-to-tr from-brand-dark/20 to-transparent z-10 mix-blend-multiply"></div>
                                    <img 
                                        src="https://images.unsplash.com/photo-1577219491135-ce391730fb2c?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" 
                                        alt="Chef profesional sedang menyiapkan hidangan" 
                                        className="w-full h-full object-cover object-center"
                                    />
                                </div>
                                {/* Elemen dekoratif */}
                                <div className="absolute -bottom-6 -left-6 w-24 h-24 bg-brand-light/20 rounded-full blur-xl z-0"></div>
                                <div className="absolute -top-6 -right-6 w-32 h-32 bg-brand-yellow/20 rounded-full blur-xl z-0"></div>
                            </Reveal>

                        </div>
                    </div>
                </section>
            );
        };

        // --- Komponen Bagian Fitur ---
        const FeaturesSection = () => {
            return (
                <section className="py-20 bg-brand-gray/50 border-t border-gray-100">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        
                        <Reveal className="text-center max-w-3xl mx-auto mb-16">
                            <h2 className="text-3xl font-heading font-bold text-brand-dark mb-4">Kendalikan Dapur Anda</h2>
                            <p className="text-lg text-brand-text">
                                Semua yang Anda butuhkan untuk menjalankan dapur profesional berefisiensi tinggi, terintegrasi sempurna dalam satu antarmuka klinis.
                            </p>
                        </Reveal>

                        {/* Grid Fitur */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            
                            {/* Kartu 1: Inventaris */}
                            <Reveal delay="delay-100" className="bg-white rounded-2xl p-8 shadow-soft border border-gray-100 relative overflow-hidden group hover:shadow-md transition-shadow">
                                <div className="absolute right-0 top-0 bottom-0 w-1/2 opacity-10 bg-[url('https://images.unsplash.com/photo-1583258292688-d0213dc5a3a8?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80')] bg-cover bg-center transition-transform duration-700 group-hover:scale-105"></div>
                                <div className="relative z-10">
                                    <div className="w-12 h-12 rounded-lg bg-brand-yellow/20 flex items-center justify-center mb-6 text-brand-dark">
                                        <Icon name="Package" className="w-6 h-6" />
                                    </div>
                                    <h3 className="text-xl font-heading font-bold text-brand-dark mb-3">Manajemen Inventaris Real-Time</h3>
                                    <p className="text-brand-text leading-relaxed max-w-sm">
                                        Lacak bahan baku hingga ke satuan gram. Terima peringatan sebelum stok kritis habis, memastikan Anda tidak pernah kehabisan menu secara tidak terduga.
                                    </p>
                                </div>
                            </Reveal>

                            {/* Kartu 2: Kalkulasi Biaya */}
                            <Reveal delay="delay-200" className="bg-white rounded-2xl p-8 shadow-soft border border-gray-100 hover:shadow-md transition-shadow">
                                <div className="w-12 h-12 rounded-lg bg-brand-yellow/20 flex items-center justify-center mb-6 text-brand-dark">
                                    <Icon name="LayoutGrid" className="w-6 h-6" />
                                </div>
                                <h3 className="text-xl font-heading font-bold text-brand-dark mb-3">Kalkulasi Biaya Resep Dinamis</h3>
                                <p className="text-brand-text leading-relaxed">
                                    Analisis margin keuntungan secara instan saat harga bahan baku berfluktuasi. Pertahankan penataan piring (plating) dan profit yang sempurna.
                                </p>
                            </Reveal>

                            {/* Kartu 3: Penjadwalan */}
                            <Reveal delay="delay-100" className="bg-white rounded-2xl p-8 shadow-soft border border-gray-100 hover:shadow-md transition-shadow">
                                <div className="w-12 h-12 rounded-lg bg-brand-yellow/20 flex items-center justify-center mb-6 text-brand-dark">
                                    <Icon name="CalendarDays" className="w-6 h-6" />
                                </div>
                                <h3 className="text-xl font-heading font-bold text-brand-dark mb-3">Penjadwalan Staf Optimal</h3>
                                <p className="text-brand-text leading-relaxed">
                                    Prediksi kebutuhan tenaga kerja berdasarkan data penjualan historis. Kurangi lembur dan pastikan pos-pos penting selalu terjaga saat jam sibuk.
                                </p>
                            </Reveal>

                            {/* Kartu 4: Dashboard (Gelap) */}
                            <Reveal delay="delay-200" className="bg-brand-dark rounded-2xl p-8 shadow-xl relative overflow-hidden">
                                <div className="relative z-10">
                                    <div className="w-12 h-12 rounded-lg bg-white/10 flex items-center justify-center mb-6 text-brand-yellow">
                                        <Icon name="BarChart3" className="w-6 h-6" />
                                    </div>
                                    <h3 className="text-xl font-heading font-bold text-white mb-3">Dashboard Laporan Eksekutif</h3>
                                    <p className="text-brand-light leading-relaxed max-w-sm mb-8">
                                        Dapatkan tampilan menyeluruh (top-down) kinerja dapur. Lacak waktu penyelesaian pesanan, pengurangan limbah, dan profitabilitas keseluruhan dengan visualisasi data tingkat perusahaan.
                                    </p>
                                </div>
                                {/* Ilustrasi Grafik Batang Minimalis */}
                                <div className="absolute bottom-0 right-8 flex items-end gap-3 opacity-90">
                                    <div className="w-12 bg-brand-yellow/80 rounded-t-sm h-16 animate-pulse" style={{animationDuration: '3s'}}></div>
                                    <div className="w-12 bg-brand-yellow/90 rounded-t-sm h-24 animate-pulse" style={{animationDuration: '2.5s', animationDelay: '0.2s'}}></div>
                                    <div className="w-12 bg-brand-yellow rounded-t-sm h-32 animate-pulse" style={{animationDuration: '2.8s', animationDelay: '0.4s'}}></div>
                                </div>
                            </Reveal>

                        </div>
                    </div>
                </section>
            );
        };

        // --- Komponen Testimoni ---
        const TestimonialSection = () => {
            return (
                <section className="py-24 bg-white">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <Reveal className="text-center mb-16">
                            <h2 className="text-3xl font-heading font-bold text-brand-dark">Dipercaya oleh Para Executive Chef</h2>
                        </Reveal>

                        <div className="grid md:grid-cols-2 gap-8">
                            
                            {/* Testimoni 1 */}

                                </p>
                            </Reveal>

                            {/* Testimoni 2 */}
                            <Reveal delay="delay-200" className="bg-white border border-gray-100 rounded-2xl p-8 shadow-sm">
                                <div className="flex items-center gap-4 mb-6">
                                    <img src="https://images.unsplash.com/photo-1581299894007-aaa50297cf16?ixlib=rb-1.2.1&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80" alt="Sarah Jenkins" className="w-14 h-14 rounded-full object-cover bg-gray-100" />
