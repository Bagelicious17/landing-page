<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harga - Pantau Dapur MBG ERP</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Page Transition Animation -->
    <style>
        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .page-transition {
            animation: pageFadeIn 0.5s ease-out forwards;
        }
    </style>

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0A193A',
                            light: '#9DCCD5',
                            yellow: '#F3D38D',
                            gray: '#F8FAFC',
                            text: '#334155',
                            bgLight: '#F4F7FB' /* Warna background biru super muda seperti di gambar */
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Montserrat', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 4px 20px rgba(0,0,0,0.03)',
                        'card': '0 10px 40px -10px rgba(0,0,0,0.08)'
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="font-sans text-brand-text bg-white antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Helper Komponen Ikon ---
        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (iconRef.current) {
                    iconRef.current.innerHTML = '';
                    lucide.createIcons({
                        icons: { [name]: lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        attrs: { class: className, 'stroke-width': 2 }
                    });
                    const svgElement = document.querySelector(`[data-lucide="${name}"]`);
                    if(svgElement && iconRef.current){
                         const clone = svgElement.cloneNode(true);
                         iconRef.current.appendChild(clone);
                         svgElement.remove(); 
                    }
                }
            }, [name, className]);

            // Fallback SVG murni jika lucide telat loading
            const renderFallbackSvg = () => {
                switch(name) {
                    case 'Check': return <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>;
                    case 'Bell': return <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>;
                    case 'Settings': return <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>;
                    case 'HelpCircle': return <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>;
                    case 'Menu': return <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>;
                    case 'X': return <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>;
                    default: return null;
                }
            };

            return <div ref={iconRef} className="inline-flex items-center justify-center">{renderFallbackSvg()}</div>;
        };

        // --- Navbar Header ---
        const Navbar = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 20);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-white/90 backdrop-blur-md shadow-sm py-3' : 'bg-white py-5 border-b border-gray-100'}`}>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between items-center">
                            {/* Logo */}
                            <div className="flex items-center gap-2">
                                <a href="index.html" className="flex items-center gap-2">
                                    <img src="../aset/logo-erp-main.png" alt="Logo" className="h-10" />
                                    <span className="font-heading font-bold text-xl text-brand-dark">Pantau Dapur MBG</span>
                                </a>
                            </div>

                            {/* Navigasi Tengah */}
                            <div className="hidden md:flex space-x-8">
                                <a href="index.html" className="text-sm font-medium text-brand-text hover:text-brand-dark transition-colors">Fitur</a>
                                {/* Link Aktif (Pricing) */}
                                <div className="relative">
                                    <a href="#" className="text-sm font-bold text-brand-dark pb-1">Harga</a>
                                    <div className="absolute -bottom-1 left-0 w-full h-0.5 bg-brand-yellow"></div>
                                </div>
                                <a href="#" className="text-sm font-medium text-brand-text hover:text-brand-dark transition-colors">Tentang Kami</a>
                            </div>

                            {/* Tombol Aksi Desktop */}
                            <div className="hidden md:flex items-center space-x-4">
                                <a href="#" className="text-sm font-medium text-brand-text hover:text-brand-dark transition-colors">Masuk</a>
                                <a href="registration.html" className="bg-brand-dark text-white px-5 py-2.5 rounded-md text-sm font-medium hover:bg-brand-dark/90 transition-all shadow-md hover:shadow-lg">
                                    Mulai Sekarang
                                </a>
                            </div>

                            {/* Tombol Menu Mobile */}
                            <div className="md:hidden flex items-center">
                                <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="text-brand-dark">
                                    <Icon name={mobileMenuOpen ? 'X' : 'Menu'} className="w-6 h-6" />
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Menu Mobile */}
                    {mobileMenuOpen && (
                        <div className="md:hidden bg-white border-t border-gray-100 absolute w-full shadow-lg">
                            <div className="px-2 pt-2 pb-3 space-y-1 sm:px-3">
                                <a href="index.html" className="block px-3 py-2 text-base font-medium text-brand-text hover:text-brand-dark hover:bg-gray-50 rounded-md">Fitur</a>
                                <a href="#" className="block px-3 py-2 text-base font-medium text-brand-dark bg-brand-yellow/10 rounded-md">Harga</a>
                                <a href="#" className="block px-3 py-2 text-base font-medium text-brand-text hover:text-brand-dark hover:bg-gray-50 rounded-md">Tentang Kami</a>
                                <div className="mt-4 pt-4 border-t border-gray-100 px-3 flex flex-col gap-2">
                                    <a href="#" className="block text-center px-3 py-2 text-base font-medium text-brand-dark border border-gray-200 rounded-md">Masuk</a>
                                    <a href="registration.html" className="block text-center px-3 py-2 text-base font-medium bg-brand-dark text-white rounded-md">Mulai Sekarang</a>
                                </div>
                            </div>
                        </div>
                    )}
                </nav>
            );
        };

        // --- Konten Utama Pricing ---
        const PricingSection = () => {
            return (
                <section className="pt-28 pb-20 bg-white">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        {/* Judul Halaman */}
                        <div className="text-center max-w-3xl mx-auto mb-16">
                            <h1 className="text-4xl font-heading font-extrabold text-brand-dark mb-4">Presisi Klinis untuk Dapur Anda</h1>
                            <p className="text-lg text-brand-text">
                                Pilih paket yang sempurna untuk merampingkan operasional kuliner Anda. Dari<br className="hidden md:block" /> bistro kecil hingga katering perusahaan, kami memiliki solusi yang dibangun untuk efisiensi.
                            </p>
                        </div>
                        
                        {/* Grid Paket Langganan */}
                        <div className="grid md:grid-cols-3 gap-6 lg:gap-8 max-w-6xl mx-auto">
                            
                            {/* Paket Basic */}
                            <div className="bg-white rounded-xl p-8 border border-gray-200 shadow-sm flex flex-col hover:border-gray-300 transition-colors">
                                <h3 className="text-2xl font-heading font-semibold text-brand-dark mb-1">Basic</h3>
                                <p className="text-sm text-brand-text mb-6">Untuk Dapur Kecil</p>
                                
                                <div className="mb-8 flex items-baseline gap-1">
                                    <span className="text-5xl font-extrabold text-brand-dark">$49</span>
                                    <span className="text-gray-500 font-medium">/bln</span>
                                </div>
                                
                                <ul className="space-y-4 mb-10 flex-grow">
                                    <li className="flex items-start gap-3">
                                        <Icon name="Check" className="w-5 h-5 text-brand-dark shrink-0 mt-0.5" /> 
                                        <span className="text-brand-dark font-medium text-sm">Hingga 3 Pengguna</span>
                                    </li>
                                    <li className="flex items-start gap-3">
                                        <Icon name="Check" className="w-5 h-5 text-brand-dark shrink-0 mt-0.5" /> 
                                        <span className="text-brand-dark font-medium text-sm">Pelacakan Inventaris Dasar</span>
                                    </li>
                                    <li className="flex items-start gap-3">
                                        <Icon name="Check" className="w-5 h-5 text-brand-dark shrink-0 mt-0.5" /> 
                                        <span className="text-brand-dark font-medium text-sm">Integrasi KDS Standar</span>
                                    </li>
                                    <li className="flex items-start gap-3">
                                        <Icon name="Check" className="w-5 h-5 text-brand-dark shrink-0 mt-0.5" /> 
                                        <span className="text-brand-dark font-medium text-sm">Dukungan Email</span>
                                    </li>
                                </ul>
                                
                                <button className="w-full py-3.5 px-4 border border-brand-dark text-brand-dark font-semibold rounded-md hover:bg-gray-50 transition-colors text-sm tracking-wide">
                                    Pilih Basic
                                </button>
                            </div>

                            {/* Paket Pro (Paling Populer) */}
                            <div className="bg-white rounded-xl p-8 border-2 border-brand-yellow shadow-card relative flex flex-col transform md:-translate-y-4 z-10">
                                {/* Badge Paling Populer */}
                                <div className="absolute -top-3.5 left-1/2 -translate-x-1/2 bg-brand-yellow text-brand-dark px-4 py-1.5 rounded-md text-xs font-bold tracking-wide shadow-sm">
                                    Paling Populer
                                </div>
                                
                                <h3 className="text-2xl font-heading font-semibold text-brand-dark mb-1">Pro</h3>
                                <p className="text-sm text-brand-text mb-6">Restoran Volume Tinggi</p>
                                
                                <div className="mb-8 flex items-baseline gap-1">
                                    <span className="text-5xl font-extrabold text-brand-dark">$129</span>
                                    <span className="text-gray-500 font-medium">/bln</span>
                                </div>
                                
                                <ul className="space-y-4 mb-10 flex-grow">
                                    <li className="flex items-start gap-3">
                                        <Icon name="Check" className="w-5 h-5 text-brand-dark shrink-0 mt-0.5" /> 
                                        <span className="text-brand-dark font-medium text-sm">Hingga 15 Pengguna</span>
                                    </li>
                                    <li className="flex items-start gap-3">
                                        <Icon name="Check" className="w-5 h-5 text-brand-dark shrink-0 mt-0.5" /> 
                                        <span className="text-brand-dark font-medium text-sm">Manajemen Inventaris & Limbah Lanjut</span>
                                    </li>
                                    <li className="flex items-start gap-3">
                                        <Icon name="Check" className="w-5 h-5 text-brand-dark shrink-0 mt-0.5" /> 
                                        <span className="text-brand-dark font-medium text-sm">Routing KDS Multi-stasiun</span>
                                    </li>
                                    <li className="flex items-start gap-3">
                                        <Icon name="Check" className="w-5 h-5 text-brand-dark shrink-0 mt-0.5" /> 
                                        <span className="text-brand-dark font-medium text-sm">Dashboard Analitik Real-time</span>
                                    </li>
                                    <li className="flex items-start gap-3">
                                        <Icon name="Check" className="w-5 h-5 text-brand-dark shrink-0 mt-0.5" /> 
                                        <span className="text-brand-dark font-medium text-sm">Dukungan Prioritas 24/7</span>
                                    </li>
                                </ul>
                                
                                <a href="payment.html"><button className="w-full py-3.5 px-4 bg-brand-dark text-white font-semibold rounded-md hover:bg-brand-dark/90 transition-colors shadow-md text-sm tracking-wide">
                                    Pilih Pro
                                </button></a>
                            </div>

                            {/* Paket Enterprise */}
                            <div className="bg-white rounded-xl p-8 border border-gray-200 shadow-sm flex flex-col hover:border-gray-300 transition-colors">
                                <h3 className="text-2xl font-heading font-semibold text-brand-dark mb-1">Enterprise</h3>
                                <p className="text-sm text-brand-text mb-6">Grup Katering & Jaringan</p>
                                
                                <div className="mb-8 flex items-baseline gap-1">
                                    <span className="text-5xl font-extrabold text-brand-dark">Kustom</span>
                                </div>
                                
                                <ul className="space-y-4 mb-10 flex-grow">
                                    <li className="flex items-start gap-3">
                                        <Icon name="Check" className="w-5 h-5 text-brand-dark shrink-0 mt-0.5" /> 
                                        <span className="text-brand-dark font-medium text-sm">Pengguna Tak Terbatas</span>
                                    </li>
                                    <li className="flex items-start gap-3">
                                        <Icon name="Check" className="w-5 h-5 text-brand-dark shrink-0 mt-0.5" /> 
                                        <span className="text-brand-dark font-medium text-sm">Manajemen Komisari Terpusat</span>
                                    </li>
                                    <li className="flex items-start gap-3">
                                        <Icon name="Check" className="w-5 h-5 text-brand-dark shrink-0 mt-0.5" /> 
                                        <span className="text-brand-dark font-medium text-sm">Integrasi API Kustom</span>
                                    </li>
                                    <li className="flex items-start gap-3">
                                        <Icon name="Check" className="w-5 h-5 text-brand-dark shrink-0 mt-0.5" /> 
                                        <span className="text-brand-dark font-medium text-sm">Manajer Akun Khusus</span>
                                    </li>
                                </ul>
                                
                                <button className="w-full py-3.5 px-4 border border-brand-dark text-brand-dark font-semibold rounded-md hover:bg-gray-50 transition-colors text-sm tracking-wide">
                                    Hubungi Sales
                                </button>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // --- Konten FAQ ---
        const FAQSection = () => {
            return (
                <section className="py-20 bg-brand-bgLight">
                    <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                        <h2 className="text-3xl font-heading font-bold text-center text-brand-dark mb-10">Pertanyaan yang Sering Diajukan</h2>
                        
                        <div className="space-y-4">
                            {/* FAQ 1 */}
                            <div className="bg-white p-6 rounded-md border border-gray-200 shadow-sm">
                                <h4 className="font-semibold text-brand-dark mb-2 text-sm">Bisakah saya mengganti paket nanti?</h4>
                                <p className="text-gray-600 text-sm leading-relaxed">
                                    Tentu saja. Anda dapat meningkatkan (upgrade) atau menurunkan (downgrade) paket Anda kapan saja. Biaya prorata akan otomatis diterapkan pada siklus tagihan berikutnya.
                                </p>
                            </div>
                            
                            {/* FAQ 2 */}
                            <div className="bg-white p-6 rounded-md border border-gray-200 shadow-sm">
                                <h4 className="font-semibold text-brand-dark mb-2 text-sm">Perangkat keras apa yang dibutuhkan untuk KDS?</h4>
                                <p className="text-gray-600 text-sm leading-relaxed">
                                    Dapur MBG tidak bergantung pada perangkat keras tertentu (hardware agnostic). Sistem ini berjalan efisien di tablet modern atau monitor layar sentuh apa pun dengan koneksi internet yang stabil. Kami merekomendasikan layar 10" atau lebih besar untuk visibilitas dapur yang optimal.
                                </p>
                            </div>
                            
                            {/* FAQ 3 */}
                            <div className="bg-white p-6 rounded-md border border-gray-200 shadow-sm">
                                <h4 className="font-semibold text-brand-dark mb-2 text-sm">Apakah Anda menawarkan bantuan onboarding?</h4>
                                <p className="text-gray-600 text-sm leading-relaxed">
                                    Ya, paket Pro menyertakan sesi onboarding terpandu, dan Enterprise mencakup spesialis implementasi khusus. Pengguna Basic memiliki akses ke basis pengetahuan komprehensif kami dan dukungan email.
                                </p>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // --- Komponen Footer ---
        const Footer = () => {
            return (
                <footer className="bg-brand-bgLight border-t border-gray-200 py-8">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-4">
                        <p className="text-xs text-gray-500">
                            2026 MBG Kitchen ERP. Hak cipta dilindungi undang-undang.
                        </p>
                        <div className="flex space-x-6 text-xs text-gray-500">
                            <a href="#" className="hover:text-brand-dark transition-colors">Kebijakan Privasi</a>
                            <a href="#" className="hover:text-brand-dark transition-colors">Syarat Layanan</a>
                            <a href="#" className="hover:text-brand-dark transition-colors">Status Sistem</a>
                        </div>
                    </div>
                </footer>
            );
        };

        // --- Render Utama ---
        const App = () => {
            return (
                <div className="min-h-screen flex flex-col page-transition">
                    <Navbar />
                    <main className="flex-grow">
                        <PricingSection />
                        <FAQSection />
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
